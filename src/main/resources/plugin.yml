name: EmeraldPractice
version: '1.0-SNAPSHOT'
main: com.emeraldnetwork.emeraldPractice.EmeraldPractice
api-version: '1.8.8'
prefix: Emerald
authors: [Avis]
description: uhh ye
website: emerald-network.com
depend: [ProtocolLib]
commands:
  kit:
    description: edit kits
  map:
    description: edit maps
  queue:
    description: queue for gamemodes
    aliases:
      - q
  edit:
    description: allows you to place blocks
  setspawn:
    description: set a custom spawnpoint
  leave:
    description: lets you leave games
    aliases:
      - l
  world:
    description: create new world
  inventory:
    description: view player past inventories
  resetstats:
    description: reset player stats
  duel:
    description: send a duel to a player
    aliases:
      - d
  accept:
    description: accept duels
  spectate:
    description: spectate game
    aliases:
      - spec
      - s
  settings:
    description: edit your settings
  party:
    description: make a party
    aliases:
      - p
  pc:
    description: send messages to the party
  kiteditor:
    description: edit kit layouts
    aliases:
      - ke
  goldenhead:
    description: give a golden head